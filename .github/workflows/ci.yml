name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# The app is a desktop app (Windows fully supported; macOS/Linux best-effort
# behind src/platform). CI deliberately runs only static analysis — nothing
# here imports or executes the app code, so plain Linux runners work.
jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install tools
        run: python -m pip install -r requirements-dev.txt
      - name: Ruff (lint + flake8-bandit security rules)
        run: ruff check --output-format=github src scripts
      - name: Black (format check)
        run: black --check --diff src scripts

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install tools
        run: python -m pip install -r requirements-dev.txt
      - name: Mypy (type-checks as Windows/py3.12; config in pyproject.toml)
        run: mypy
